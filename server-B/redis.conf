# ============================================================
# Redis 配置文件 — 服务器 B（110.40.177.238）
# 轻量缓存模式（2C4G 环境优化版）
# ============================================================

# --- 持久化 ---
# 秒级体验优先：关闭 AOF 持久化，减少磁盘 I/O
# 如果数据需要持久化，改为:
#   appendonly yes
#   appendfsync everysec
appendonly no

# --- 内存管理 ---
# 限制最大内存，防止 OOM
maxmemory 200mb
# LRU 淘汰策略：最近最少使用的 key 优先淘汰
maxmemory-policy allkeys-lru

# --- 网络 ---
bind 0.0.0.0
protected-mode yes
requirepass Wang@123

# --- 安全加固 ---
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""

# --- 性能优化（2C4G）---
# 关闭 RDB 持久化（省 CPU）
save ""
