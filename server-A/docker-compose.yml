# ============================================================
# 服务器 A（124.223.22.34 | 4核 4G | 上海）
# 角色：主推理节点
# 服务：Ollama（LLM + Embedding）+ AgentX Java 后端
# ============================================================

services:
  # ────────────────────────────────────────
  # Ollama 推理服务（本机 Java 后端调用，零网络延迟）
  # ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: agentx-ollama
    restart: always
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      # 4G 环境保命：限制并行请求数
      - OLLAMA_NUM_PARALLEL=2
      # 限制同时加载模型数
      - OLLAMA_MAX_LOADED_MODELS=1
      # ⭐ 秒级体验关键：模型常驻内存，永不卸载
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────
  # AgentX Java 后端（与 Ollama 同机，本机调用）
  # ────────────────────────────────────────
  ai-rag-backend:
    build:
      context: ../spring-ai-rag
      dockerfile: Dockerfile
    image: spring-ai-rag:latest
    container_name: ai-rag-backend
    restart: always
    environment:
      # 本机 IP
      - CLOUD_IP=124.223.22.34
      # 虚拟线程（高并发场景提升吞吐）
      - SPRING_THREADS_VIRTUAL_ENABLED=true
      # ─── 跨服务器配置 ───
      # Ollama：本机调用，零延迟
      - AI_OLLAMA_BASE_URL=http://124.223.22.34:11434
      # Milvus：指向服务器 B
      - MILVUS_URI=http://110.40.177.238:19530
      # Redis：指向服务器 B
      - SPRING_REDIS_HOST=110.40.177.238
      # Jaeger：指向服务器 C
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://8.140.221.150:4317
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
